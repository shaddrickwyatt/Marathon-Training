<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marathon Training Plan — Phases 2, 3 & 4</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f2;color:#1a1a18;padding:2rem 1rem}
.container{max-width:960px;margin:0 auto}
h1{font-size:22px;font-weight:500;margin-bottom:4px}
.subtitle{font-size:14px;color:#5f5e5a;margin-bottom:2rem}
:root{
  --color-background-primary:#ffffff;
  --color-background-secondary:#f1efe8;
  --color-background-info:#e6f1fb;
  --color-text-primary:#1a1a18;
  --color-text-secondary:#5f5e5a;
  --color-text-info:#185fa5;
  --color-border-tertiary:rgba(0,0,0,0.12);
  --color-border-secondary:rgba(0,0,0,0.22);
  --border-radius-md:8px;
  --border-radius-lg:12px;
}
@media(prefers-color-scheme:dark){
  :root{
    --color-background-primary:#2c2c2a;
    --color-background-secondary:#444441;
    --color-background-info:#0c447c;
    --color-text-primary:#f1efe8;
    --color-text-secondary:#b4b2a9;
    --color-text-info:#85b7eb;
    --color-border-tertiary:rgba(255,255,255,0.12);
    --color-border-secondary:rgba(255,255,255,0.22);
  }
  body{background:#1a1a18;color:#f1efe8}
}
.ph-tabs,.wk-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:1.25rem}
.ph-tab,.wk-btn{padding:6px 13px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);font-size:12px;cursor:pointer;background:transparent;color:var(--color-text-secondary)}
.ph-tab.active,.wk-btn.active{background:var(--color-background-info);color:var(--color-text-info);border-color:transparent;font-weight:500}
.wk-btn.deload{border-color:#9FE1CB;color:#0F6E56}
.wk-btn.deload.active{background:#E1F5EE;color:#085041}
.wk-btn.race{border-color:#F5C4B3;color:#993C1D}
.wk-btn.race.active{background:#FAECE7;color:#993C1D}
.day-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1.25rem}
@media(max-width:600px){.day-grid{grid-template-columns:1fr}}
.day-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:12px 14px}
.day-card.full{grid-column:1/-1}
.day-card.rest-card{background:var(--color-background-secondary)}
.day-card.race-card{background:#FAECE7;border-color:#F5C4B3}
.dc-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.dc-day{font-size:11px;font-weight:500;letter-spacing:.05em;text-transform:uppercase;color:var(--color-text-secondary)}
.dc-tag{font-size:11px;padding:2px 9px;border-radius:20px}
.tag-run{background:var(--color-background-info);color:var(--color-text-info)}
.tag-str{background:#EEEDFE;color:#3C3489}
.tag-rest{background:var(--color-background-secondary);color:var(--color-text-secondary)}
.tag-cross{background:#E1F5EE;color:#0F6E56}
.tag-tempo{background:#FAEEDA;color:#633806}
.tag-race{background:#FAECE7;color:#993C1D}
.dc-title{font-size:14px;font-weight:500;color:var(--color-text-primary);margin-bottom:8px}
.dc-meta{font-size:12px;color:var(--color-text-secondary);margin-bottom:10px;line-height:1.5}
.sec-label{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.05em;color:var(--color-text-secondary);margin:10px 0 5px;border-top:0.5px solid var(--color-border-tertiary);padding-top:8px}
.sec-label.first{border-top:none;padding-top:0;margin-top:0}
.ex-table{width:100%;border-collapse:collapse}
.ex-table th{font-size:11px;font-weight:500;color:var(--color-text-secondary);text-align:left;padding:4px 0;border-bottom:0.5px solid var(--color-border-tertiary)}
.ex-table td{font-size:12px;color:var(--color-text-primary);padding:5px 0;border-bottom:0.5px solid var(--color-border-tertiary);vertical-align:top}
.ex-table tr:last-child td{border-bottom:none}
.ex-name{font-weight:500}
.ex-note{font-size:11px;color:var(--color-text-secondary);line-height:1.4;margin-top:1px}
.pill{display:inline-block;font-size:11px;padding:1px 7px;border-radius:20px;font-weight:500}
.pill-str{background:#EEEDFE;color:#3C3489}
.pill-run{background:var(--color-background-info);color:var(--color-text-info)}
.pill-back{background:#FAEEDA;color:#633806}
.pill-core{background:#E1F5EE;color:#085041}
.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1.25rem}
.stat{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:10px 12px}
.stat-label{font-size:11px;color:var(--color-text-secondary);margin-bottom:3px}
.stat-val{font-size:18px;font-weight:500;color:var(--color-text-primary)}
.banner{border-radius:var(--border-radius-md);padding:8px 12px;font-size:12px;margin-bottom:1rem;line-height:1.6}
.banner-deload{background:#E1F5EE;border:0.5px solid #9FE1CB;color:#085041}
.banner-race{background:#FAECE7;border:0.5px solid #F5C4B3;color:#993C1D}
.pace-bar{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1.25rem}
.pace-item{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:8px 12px}
.pace-label{font-size:11px;color:var(--color-text-secondary);margin-bottom:2px}
.pace-val{font-size:13px;font-weight:500;color:var(--color-text-primary)}
.ph-header{margin-bottom:1.25rem;border-left:3px solid var(--color-border-info,#185fa5);padding-left:1rem}
.ph-title{font-size:16px;font-weight:500;color:var(--color-text-primary);margin-bottom:3px}
.ph-sub{font-size:12px;color:var(--color-text-secondary);line-height:1.5}
</style>
</head>
<body>
<div class="container">
  <h1>Marathon Training Plan</h1>
  <p class="subtitle">Phases 2, 3 &amp; 4 — Beginner · 6'2" 219 lb · 35 min 5K baseline</p>

  <div class="ph-tabs" id="ph-tabs">
    <button class="ph-tab active" onclick="setPhase(0)">Phase 2 — Build (Wks 13–30)</button>
    <button class="ph-tab" onclick="setPhase(1)">Phase 3 — Peak (Wks 31–46)</button>
    <button class="ph-tab" onclick="setPhase(2)">Phase 4 — Taper (Wks 47–52)</button>
  </div>
  <div id="ph-header"></div>
  <div class="pace-bar" id="pace-bar"></div>
  <div style="font-size:11px;font-weight:500;color:var(--color-text-secondary);letter-spacing:.05em;text-transform:uppercase;margin-bottom:8px" id="wk-label"></div>
  <div class="wk-row" id="wk-row"></div>
  <div id="content"></div>
</div>

<script>
const P2={
  title:"Phase 2 — Build",
  sub:"Weeks 13–30 · Mileage climbs steadily. Strength shifts heavier — 4 sets × 6–8 reps. One quality tempo run joins the schedule on Thursdays.",
  paces:[{label:"Easy run pace",val:"12:30–13:15/mi"},{label:"Tempo pace",val:"10:30–11:00/mi"},{label:"Long run pace",val:"13:00–13:45/mi"}],
  weeks:[
    {run:[38,35,65],deload:false},{run:[40,37,72],deload:false},{run:[42,38,80],deload:false},{run:[30,30,55],deload:true},
    {run:[44,40,85],deload:false},{run:[46,42,92],deload:false},{run:[48,43,100],deload:false},{run:[34,32,68],deload:true},
    {run:[50,45,108],deload:false},{run:[50,46,115],deload:false},{run:[52,48,122],deload:false},{run:[36,34,80],deload:true},
    {run:[52,50,128],deload:false},{run:[54,50,135],deload:false},{run:[54,52,142],deload:false},{run:[38,35,95],deload:true},
    {run:[55,52,148],deload:false},{run:[55,54,150],deload:false}
  ],
  globalStart:13
};
const P3={
  title:"Phase 3 — Peak",
  sub:"Weeks 31–46 · Your longest runs happen here. Strength shifts to maintenance — protect recovery. Wednesday is now your marathon-pace tempo day.",
  paces:[{label:"Easy run pace",val:"12:00–12:45/mi"},{label:"Marathon goal pace",val:"11:30–12:00/mi"},{label:"Long run pace",val:"12:45–13:30/mi"}],
  weeks:[
    {run:[45,50,150],deload:false},{run:[45,52,160],deload:false},{run:[35,45,110],deload:true},{run:[48,52,165],deload:false},
    {run:[48,55,170],deload:false},{run:[35,45,115],deload:true},{run:[50,55,175],deload:false},{run:[50,58,180],deload:false},
    {run:[38,48,120],deload:true},{run:[50,58,185],deload:false},{run:[52,60,195],deload:false},{run:[38,48,130],deload:true},
    {run:[52,60,200],deload:false},{run:[50,58,205],deload:false},{run:[38,48,140],deload:true},{run:[48,55,210],deload:false}
  ],
  globalStart:31
};
const P4={
  title:"Phase 4 — Taper",
  sub:"Weeks 47–52 · Volume drops 40–50% while keeping a touch of intensity. Your body absorbs 51 weeks of work. Trust the taper — don't fill the gap with extra training.",
  paces:[{label:"Easy run pace",val:"12:00–12:30/mi"},{label:"Race pace (tune-ups)",val:"11:30–12:00/mi"},{label:"Goal finish time",val:"~5:00–5:15"}],
  weeks:[
    {run:[35,30,90],deload:false},{run:[30,28,75],deload:false},{run:[28,25,60],deload:false},
    {run:[25,22,50],deload:false},{run:[22,20,25],deload:false},{run:[18,12,10],deload:false,race:true}
  ],
  globalStart:47
};
const phases=[P2,P3,P4];
let curPhase=0,curWeek=0;

const p2A={
  lower:[
    {n:"Barbell Back Squat",s:"4 × 6–8",p:"str",note:"No rack? Use a heavy Goblet Squat. Brace core hard, sit deep, drive knees out. Add weight when you hit 8 clean reps two sessions in a row."},
    {n:"Romanian Deadlift",s:"4 × 8",p:"str",note:"Barbell or dumbbells. Hinge at hips, bar stays close to legs. Heavier than Phase 1 — add 5–10 lbs every 1–2 weeks."},
    {n:"Bulgarian Split Squat",s:"3 × 8 / leg",p:"str",note:"Rear foot on bench, front foot forward. Lower back knee toward floor. Builds unilateral hip strength — key for single-leg running mechanics."}
  ],
  back:[
    {n:"Barbell or Dumbbell Row",s:"4 × 8",p:"back",note:"Hinge to ~45°, pull to lower ribs, control the lowering (2 sec). This is your primary back builder — go heavier than Phase 1."},
    {n:"Face Pull",s:"3 × 15",p:"back",note:"Cable or band at face height. Pull to forehead with elbows high and flared. Protects shoulder joints and directly counteracts the forward lean of long-distance running."},
    {n:"Rack Pull",s:"3 × 6",p:"back",note:"Bar just below knee height. Heavy hinge — builds the spinal erectors and upper back under real load. Think of it as a short-range deadlift focused on the lockout."}
  ],
  push:[
    {n:"Dumbbell Bench Press",s:"4 × 8",p:"str",note:"Control the lowering (2–3 sec). Full range — feel the stretch at the bottom. Builds chest and triceps without taxing the lower body before Saturday's long run."},
    {n:"Hanging Knee Raise",s:"3 × 12",p:"core",note:"Hang from a bar, pull knees to chest, lower with control. No bar? Do lying leg raises. Core strength that supports upright posture over miles."}
  ]
};
const p2B={
  lower:[
    {n:"Conventional or Trap Bar Deadlift",s:"4 × 6",p:"str",note:"The primary compound movement for runners. Drive feet through floor, back flat, lock hips fully at top. This is your heaviest lift of the week — treat it that way."},
    {n:"Hip Thrust",s:"4 × 10",p:"str",note:"Upper back on bench, barbell across hips, drive explosively to top. Squeeze glutes for 1 sec. The best glute exercise for running power — don't skip it."},
    {n:"Walking Lunge",s:"3 × 10 / leg",p:"str",note:"Long stride, back knee grazes floor. Hold dumbbells. Challenges balance and hip stability under load — highly sport-specific for running."}
  ],
  back:[
    {n:"Lat Pulldown",s:"4 × 8",p:"back",note:"Wide grip, pull to upper chest. Heavier than Phase 1 — really challenge the lats. Keep torso still and don't lean back excessively."},
    {n:"Seated Cable or Band Row",s:"4 × 8",p:"back",note:"Drive elbows back toward hips. Squeeze shoulder blades together at the end. Builds mid-back thickness that supports the spine over long miles."},
    {n:"Y-T-W Raise",s:"2 × 10 each",p:"back",note:"Face down, light plates or bodyweight. Targets lower traps and rhomboids — the muscles that prevent the dreaded hunch during miles 20–26."}
  ],
  core:[
    {n:"Copenhagen Plank",s:"3 × 20 sec / side",p:"core",note:"Side plank with top foot on bench, bottom leg hanging free. Trains adductors and lateral hip — prevents the hip drop that leads to knee injuries in runners at higher mileage."},
    {n:"Pallof Press",s:"3 × 12 / side",p:"core",note:"Band or cable at chest height, press straight out and hold 2 sec. Anti-rotation strength means energy transfers forward during running rather than bleeding sideways."}
  ]
};
const p3Mon={
  lower:[
    {n:"Squat (Barbell or Goblet)",s:"3 × 8",p:"str",note:"Same movement as Phase 2 — don't push to maximum load. Leave 3 reps in the tank every set."},
    {n:"Romanian Deadlift",s:"3 × 8",p:"str",note:"Moderate weight. Focused hamstring activation. No PR attempts — maintain the strength you've built."}
  ],
  back:[
    {n:"Barbell or Dumbbell Row",s:"3 × 10",p:"back",note:"Moderate weight, full range. Maintaining strength without accumulating soreness."},
    {n:"Face Pull",s:"3 × 15",p:"back",note:"Light resistance. Shoulder health and posture maintenance. Stays in every phase."},
    {n:"Lat Pulldown",s:"2 × 10",p:"back",note:"Controlled pull, full range. Keeping lats and upper back engaged without adding fatigue."}
  ],
  core:[
    {n:"Plank",s:"2 × 50 sec",p:"core",note:"Brace hard and breathe slowly. Your plank should be dramatically stronger than week 1."},
    {n:"Dead Bug",s:"2 × 10 / side",p:"core",note:"Slow and deliberate. Good reset for spinal stability after high-volume long run weeks."}
  ]
};
const p3Thu=[
  {n:"Glute Bridge",s:"2 × 15",p:"str",note:"Activates glutes without spinal loading. Perfect maintenance work and pre-run activation."},
  {n:"Reverse Lunge",s:"2 × 10 / leg",p:"str",note:"Bodyweight or very light dumbbells. Keeps hip flexors and glutes mobile heading into the weekend."},
  {n:"Band Row",s:"2 × 15",p:"back",note:"Light resistance band. Upper back engagement and running posture maintenance."},
  {n:"Y-T-W Raise",s:"2 × 10 each",p:"back",note:"Mid and lower trap work. Staying upright over 26.2 miles depends on consistency here."},
  {n:"Side Plank",s:"2 × 35 sec / side",p:"core",note:"Hip stability maintenance. Prevents lateral hip drop that exhausts the IT band in the back half."}
];
const p4Mon=[
  {n:"Bodyweight Squat",s:"2 × 10",p:"str",note:"Full depth, slow and controlled. No loading — keeping movement pattern fresh."},
  {n:"Push-up",s:"2 × 10",p:"str",note:"Deliberate tempo. Chest and upper back engagement without creating soreness."},
  {n:"Light Dumbbell Row",s:"2 × 12",p:"back",note:"30–40% of Phase 2 working weight. Purely for posture and blood flow."},
  {n:"Glute Bridge",s:"2 × 15",p:"str",note:"Activate glutes without loading the spine. Pre-race neuromuscular priming."},
  {n:"Plank",s:"2 × 30 sec",p:"core",note:"Maintain the pattern. No need to push duration this close to race day."},
  {n:"Face Pull (band)",s:"2 × 15",p:"back",note:"Keep rear delts and mid-traps firing. Maintains upright posture when fatigue hits in the race."}
];

const pClass={str:"pill-str",back:"pill-back",core:"pill-core",run:"pill-run"};
function exRows(arr){return arr.map(e=>`<tr><td><div class="ex-name">${e.n}</div></td><td><span class="pill ${pClass[e.p]}">${e.s}</span></td><td><div class="ex-note">${e.note}</div></td></tr>`).join('')}
function exTbl(arr){return`<table class="ex-table"><tr><th style="width:40%">Exercise</th><th style="width:22%">Volume</th><th>Notes</th></tr>${exRows(arr)}</table>`}
function runCard(day,tag,tagCls,title,mins,meta,rows){
  const rowHtml=rows.map(r=>`<tr><td>${r[0]}</td><td>${r[1]}</td><td class="ex-note">${r[2]}</td></tr>`).join('');
  return`<div class="day-card"><div class="dc-header"><span class="dc-day">${day}</span><span class="dc-tag ${tagCls}">${tag}</span></div><div class="dc-title">${title} <span class="pill pill-run">${mins} min</span></div><div class="dc-meta">${meta}</div><table class="ex-table"><tr><th>Segment</th><th>Time</th><th>Notes</th></tr>${rowHtml}</table></div>`
}
function strCard(day,tag,title,meta,sections){
  const body=sections.map((s,i)=>`<div class="sec-label${i===0?' first':''}">${s.label}</div>${exTbl(s.exs)}`).join('');
  return`<div class="day-card"><div class="dc-header"><span class="dc-day">${day}</span><span class="dc-tag tag-str">${tag}</span></div><div class="dc-title">${title}</div><div class="dc-meta">${meta}</div>${body}</div>`
}
function restCard(day,title,meta,full){
  return`<div class="day-card rest-card${full?' full':''}"><div class="dc-header"><span class="dc-day">${day}</span><span class="dc-tag tag-rest">Rest</span></div><div class="dc-title">${title}</div><div class="dc-meta">${meta}</div></div>`
}

function renderContent(pi,wi){
  const p=phases[pi],w=p.weeks[wi];
  const [tue,quality,sat]=w.run;
  const totalMins=tue+quality+sat;
  const approxMiles=Math.round((totalMins/13)*10)/10;
  const strDays=w.race?'0':pi===2?'1':'2';
  let banner=w.deload?`<div class="banner banner-deload">Deload week — volume drops ~30%. Your body is adapting. Don't fill the gap with extra training.</div>`:w.race?`<div class="banner banner-race">Race week! Volume is minimal — you've done 51 weeks of work. Trust your training and run your marathon on Sunday.</div>`:'';
  const stats=`<div class="stat-row"><div class="stat"><div class="stat-label">Total run time</div><div class="stat-val">${totalMins} min</div></div><div class="stat"><div class="stat-label">Est. run mileage</div><div class="stat-val">~${approxMiles} mi</div></div><div class="stat"><div class="stat-label">Strength days</div><div class="stat-val">${strDays}</div></div></div>`;
  let days='';

  if(pi===0){
    const tb=quality-20;
    days=
      strCard("Monday","Strength A","Full body — Workout A","~60 min · 4 sets, heavier than Phase 1 · Rest 2 min between main lifts · Aim to add weight every 1–2 weeks",[
        {label:"Lower body",exs:p2A.lower},{label:"Back",exs:p2A.back},{label:"Push & core",exs:p2A.push}
      ])+
      runCard("Tuesday","Easy run","tag-run","Easy run",tue,"12:30–13:15/mi · Truly conversational pace.",
        [["Walk warm-up","3 min","Brisk walk to prime the system"],["Easy run",`${tue-5} min`,"Flat route, full sentence talk-test throughout"],["Walk cool-down","2 min","Let heart rate settle before stretching"]])+
      strCard("Wednesday","Strength B","Full body — Workout B","~60 min · Deadlift is your heaviest set of the week · Rest 2–3 min after deadlifts",[
        {label:"Lower body",exs:p2B.lower},{label:"Back",exs:p2B.back},{label:"Core",exs:p2B.core}
      ])+
      runCard("Thursday","Tempo","tag-tempo","Tempo run",quality,"10:30–11:00/mi for the tempo block · Comfortably hard — not a sprint.",
        [["Easy warm-up","10 min","Very easy jog — fully wake up before picking up pace"],["Tempo block",`${tb} min`,"Steady comfortably-hard effort. Even pace throughout."],["Easy cool-down","10 min","Very easy jog or walk. Shake out the legs."]])+
      `<div class="day-card rest-card"><div class="dc-header"><span class="dc-day">Friday</span><span class="dc-tag tag-cross">Cross-train</span></div><div class="dc-title">Rest or cross-training</div><div class="dc-meta">Easy cycling, swimming, elliptical, or yoga. Low-impact and under 60% effort only. Or take full rest.</div></div>`+
      runCard("Saturday","Long run","tag-run","Long run",sat,"13:00–13:45/mi · Fuel with gels if over 75 min — practice race day nutrition.",
        [["Walk warm-up","5 min","Longer warm-up on long run days"],["Long run",`${sat-10} min`,"Time on feet is the goal. Walk breaks are allowed."],["Walk cool-down","5 min","10 min stretching: calves, quads, hip flexors, lats"]])+
      restCard("Sunday","Full rest","Complete rest. Eat a solid recovery meal with 50g+ protein. Sleep 8+ hrs.",true);

  } else if(pi===1){
    const mb=quality-24;
    days=
      strCard("Monday","Maintenance","Full body — maintenance strength","~50 min · 3 sets, moderate weight · Leave 3 reps in the tank · No PRs",[
        {label:"Lower body",exs:p3Mon.lower},{label:"Back",exs:p3Mon.back},{label:"Core",exs:p3Mon.core}
      ])+
      runCard("Tuesday","Easy run","tag-run","Easy run",tue,"12:00–12:45/mi · If peak phase fatigue lingers in legs, go even slower.",
        [["Walk warm-up","3 min","Gentle start"],["Easy run",`${tue-5} min`,"Conversational pace throughout"],["Walk cool-down","2 min","Light calf and hip flexor stretch after"]])+
      runCard("Wednesday","Tempo","tag-tempo","Marathon pace run",quality,"11:30–12:00/mi for the tempo block · Learn how goal pace feels in your body.",
        [["Easy warm-up","12 min","Take your time getting to marathon pace"],["Marathon pace block",`${mb} min`,"Goal pace: 11:30–12:00/mi. Controlled and sustainable."],["Easy cool-down","12 min","Very easy jog or walk. Full heart rate recovery."]])+
      `<div class="day-card"><div class="dc-header"><span class="dc-day">Thursday</span><span class="dc-tag tag-str">Light strength</span></div><div class="dc-title">Light strength — maintenance</div><div class="dc-meta">~30–35 min · Glutes, hips, and back focus · Do not push intensity</div>${exTbl(p3Thu)}</div>`+
      restCard("Friday","Rest or gentle yoga","Foam roll the upper back, IT band, and calves. Sleep 8+ hrs.")+
      runCard("Saturday","Peak long run","tag-run","Peak long run",sat,"12:45–13:30/mi · Fuel every 45 min. Practice race day nutrition and hydration.",
        [["Walk warm-up","5 min","Extra warm-up time for long run days"],["Peak long run",`${sat-10} min`,"Very easy throughout. Walk breaks every 45–50 min if needed."],["Walk cool-down","5 min","10–15 min stretching: calves, hip flexors, lats, thoracic spine"]])+
      restCard("Sunday","Full rest","Non-negotiable rest. Eat plenty of carbs and protein.",true);

  } else {
    if(w.race){
      days=
        restCard("Monday","Full rest","Nothing strenuous. Walk, stretch lightly, stay calm. Conserve leg energy.")+
        runCard("Tuesday","Shakeout","tag-run","Easy shakeout",tue,"Very easy, 12:30+/mi. Short and breezy.",
          [["Easy jog",`${tue} min`,"Light and comfortable. The goal is to feel good, not to train."]])+
        restCard("Wednesday","Full rest","Stay off your feet. Lay out race gear, confirm logistics, hydrate well.")+
        runCard("Thursday","Tune-up","tag-tempo","Pre-race activation",quality,"Brief bursts at race pace to wake up the fast-twitch muscles.",
          [["Easy warm-up","8 min","Very easy jog"],["Race pace strides","3 × 1 min","Brief bursts at goal marathon pace with 1 min easy jog between."],["Easy cool-down","4 min","Walk it out. Done."]])+
        restCard("Friday","Full rest — carb load","Eat a carb-rich dinner. Aim for 500–600g carbs across the day. Hydrate. Get to bed by 9–10 PM.")+
        runCard("Saturday","Race-eve shakeout","tag-run","Shakeout jog",sat,"Extremely easy. Just 10 minutes to shake the legs out.",
          [["Shakeout jog",`${sat} min`,"Easy as possible. Flat route. Just movement."],["Light stretch","5 min","Calves and hip flexors only"]])+
        `<div class="day-card race-card full"><div class="dc-header"><span class="dc-day">Sunday</span><span class="dc-tag tag-race">Marathon — 26.2 miles</span></div><div class="dc-title">Race day</div><div class="dc-meta">Start 30–45 sec per mile slower than goal pace for the first 10K — it will feel too easy, and that's correct. Fuel every 45 min. Walk through aid stations. Don't chase runners who go out too fast — you'll pass them at mile 20. You've trained for 52 weeks for this morning. Run your race.</div></div>`;
    } else {
      const tb=quality-13;
      days=
        `<div class="day-card"><div class="dc-header"><span class="dc-day">Monday</span><span class="dc-tag tag-str">Light strength</span></div><div class="dc-title">Bodyweight strength — taper maintenance</div><div class="dc-meta">~30 min · 2 sets only · No soreness — the race is soon</div>${exTbl(p4Mon)}</div>`+
        runCard("Tuesday","Easy run","tag-run","Easy run",tue,"12:00–12:30/mi · Short and comfortable. Taper sluggishness is normal.",
          [["Walk warm-up","3 min","Gentle start"],["Easy run",`${tue-5} min`,"Easy, conversational"],["Walk cool-down","2 min","Light stretch after"]])+
        restCard("Wednesday","Full rest","Complete rest. Foam roll calves and upper back if you'd like. No cross-training.")+
        runCard("Thursday","Tune-up","tag-tempo","Tune-up run",quality,"Brief taste of race pace to keep legs sharp.",
          [["Easy warm-up","8 min","Very easy jog"],["Race pace bursts",`${tb} min`,"Short bursts at 11:30–12:00/mi. Activation, not training."],["Easy cool-down","5 min","Very easy. Don't fatigue the legs."]])+
        restCard("Friday","Full rest","Prioritize sleep. Eat a normal, carb-friendly meal.")+
        runCard("Saturday","Easy run","tag-run",sat>40?"Moderate easy run":"Easy shakeout",sat,"Easy and comfortable. Volume reduces each week.",
          [["Easy run",`${sat-5} min`,"Very easy pace. Just staying loose."],["Walk cool-down","5 min","Light stretching: calves, hip flexors"]])+
        restCard("Sunday","Full rest","Complete rest. Eat well and sleep 8+ hrs. Every bit of energy saved now is available on race day.",true);
    }
  }
  document.getElementById('content').innerHTML=banner+stats+`<div class="day-grid">${days}</div>`;
}

function renderWeekBtns(p,pi){
  document.getElementById('wk-label').textContent='Select week\u2002\u2014\u2002green = deload'+(pi===2?' \u00B7 coral = race week':'');
  const row=document.getElementById('wk-row');
  row.innerHTML='';
  p.weeks.forEach((w,i)=>{
    const b=document.createElement('button');
    b.className='wk-btn'+(w.deload?' deload':'')+(w.race?' race':'')+(i===curWeek?' active':'');
    b.textContent=`Week ${p.globalStart+i}`;
    b.onclick=()=>{curWeek=i;renderWeekBtns(p,pi);renderContent(pi,i)};
    row.appendChild(b);
  });
}

function setPhase(i){
  curPhase=i;curWeek=0;
  document.querySelectorAll('.ph-tab').forEach((t,j)=>t.classList.toggle('active',i===j));
  const p=phases[i];
  document.getElementById('ph-header').innerHTML=`<div class="ph-header"><div class="ph-title">${p.title}</div><div class="ph-sub">${p.sub}</div></div>`;
  document.getElementById('pace-bar').innerHTML=p.paces.map(pc=>`<div class="pace-item"><div class="pace-label">${pc.label}</div><div class="pace-val">${pc.val}</div></div>`).join('');
  renderWeekBtns(p,i);
  renderContent(i,0);
}
setPhase(0);
</script>
</body>
</html>
